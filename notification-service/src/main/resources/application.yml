spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USER:hospital}
    password: ${DB_PASSWORD:hospital123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

server:
  port: ${SERVER_PORT:8082}

hospital:
  rabbitmq:
    exchange: hospital.exchange
    queue:
      appointment-events: appointment.events.queue
      appointment-dlq: appointment.events.dlq

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.hospital: DEBUG
    org.springframework.amqp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
