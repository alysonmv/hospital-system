spring:
  application:
    name: history-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:history_db}
    username: ${DB_USER:hospital}
    password: ${DB_PASSWORD:hospital123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  graphql:
    graphiql:
      enabled: true
    path: /graphql
    schema:
      locations: classpath:graphql/

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}

hospital:
  rabbitmq:
    exchange: hospital.exchange
    queue:
      appointment-events: appointment.events.history.queue
      appointment-dlq: appointment.events.history.dlq
    routing-key:
      appointment-all: appointment.*

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.hospital: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
